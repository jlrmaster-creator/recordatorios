name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./functions
        run: npm install

      - name: Check FIREBASE_TOKEN
        run: echo "TOKEN_LENGTH=${#FIREBASE_TOKEN}" >> "$GITHUB_STEP_SUMMARY"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase
        id: deploy
        continue-on-error: true
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions --project recordatorios-61c1e --non-interactive > /tmp/deploy.log 2>&1 || true

      - name: Show deploy log
        if: always()
        run: |
          echo '### Deploy output' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/deploy.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
